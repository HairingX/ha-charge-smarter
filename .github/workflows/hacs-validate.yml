name: Code validation

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate-hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: validation
        uses: home-assistant/actions/hassfest@master

  validate-hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: validation
        uses: hacs/action@main
        with:
          category: integration
          # Brand assets not yet registered in home-assistant/brands.
          # Remove this ignore once a brands PR is merged.
          ignore: brands
